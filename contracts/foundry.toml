[profile.default]
src         = "src"
out         = "out"
libs        = ["lib"]
test        = "test"
script      = "script"
cache       = true
cache_path  = "cache"
solc        = "0.8.24"
optimizer   = true
optimizer_runs = 1_000_000
via_ir      = true
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read", path = "./" }]

[profile.default.fuzz]
runs       = 1024
max_test_rejects = 65_536

[profile.default.invariant]
runs       = 256
depth      = 32
fail_on_revert = false

[profile.ci]
fuzz.runs = 4096
invariant.runs = 1024

[profile.lite]
optimizer = false
via_ir    = false

[etherscan]
base         = { key = "${BASESCAN_API_KEY}", chain = 8453,  url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }

[rpc_endpoints]
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
anvil        = "http://127.0.0.1:8545"

[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = false
int_types   = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"
wrap_comments = true
